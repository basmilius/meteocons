name: 🗂️ Warm Figma Cache

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    cache:
        runs-on: ubuntu-latest
        name: 🗂️ Update Figma cache
        steps:
            - name: 👀 Checkout
              uses: actions/checkout@v6

            - name: 🍞 Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: 📦️ Install dependencies
              run: bun install --frozen-lockfile

            - name: 🔍 Get Figma last modified
              id: figma
              run: |
                  LAST_MODIFIED=$(curl -sf -H "X-Figma-Token: $FIGMA_TOKEN" \
                      "https://api.figma.com/v1/files/$FIGMA_FILE_KEY?depth=1" \
                      | jq -r '.lastModified')
                  echo "last-modified=$LAST_MODIFIED" >> "$GITHUB_OUTPUT"
              env:
                  FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
                  FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}

            - name: 🗂️ Restore Figma cache
              id: cache
              uses: actions/cache@v5
              with:
                  path: packages/exporter/.cache
                  key: figma-cache-${{ steps.figma.outputs.last-modified }}

            - name: 🎨 Fetch SVGs from Figma
              if: steps.cache.outputs.cache-hit != 'true'
              run: bun run fetch
              env:
                  FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
                  FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
